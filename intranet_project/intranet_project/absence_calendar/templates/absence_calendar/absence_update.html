{% extends "intranet/base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="content-section">

    <h4 class="border-bottom pb-1 mb-4">Edycja nieobecności</h4>

    <form method="POST">
      {% csrf_token %}

      <fieldset class="form-group">
        {{ form|crispy }}
      </fieldset>

      <div class="form-group">
        <button class="btn btn-outline-primary" type="submit">Akceptuj</button>
      </div>
    </form>

  </div>
{% endblock content %}
